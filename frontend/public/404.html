<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SC Navigator</title>
  <script>
    var base = '/' + window.location.pathname.split('/')[1];
    sessionStorage.setItem('redirect', window.location.href.replace(window.location.origin + base, '') || '/');
    window.location.replace(window.location.origin + base + '/');
  </script>
</head>
</html>
