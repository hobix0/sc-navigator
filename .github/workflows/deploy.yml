# ──────────────────────────────────────────────────────────────────────────────
# SC Navigator · GitHub Actions Deployment Workflow
#
# Was dieser Workflow macht:
#   1. Wird ausgelöst wenn Code auf "main" gepusht wird
#   2. Installiert Node.js und alle npm Abhängigkeiten
#   3. Baut das React-Frontend mit Vite (optimierter Production-Build)
#   4. Deployed den fertigen /dist Ordner auf GitHub Pages
#
# Ergebnis: https://hobix0.github.io/SC-Navigator/
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  # Automatisch bei jedem Push auf main
  push:
    branches: [main]
  # Manueller Trigger über GitHub Actions UI möglich
  workflow_dispatch:

# Berechtigungen für GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert parallele Deployments
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build Job ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm Abhängigkeiten installieren
        run: cd frontend && npm ci

      - name: Production Build erstellen
        run: cd frontend && npm run build
        env:
          # Setzt die Base-URL auf den Repo-Namen (z.B. /SC-Navigator/)
          # Wichtig damit Assets auf GitHub Pages korrekt geladen werden
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Build-Artefakt für Pages hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ── Deploy Job ───────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
