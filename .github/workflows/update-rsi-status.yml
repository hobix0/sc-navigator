name: Update RSI Status Cache

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: RSI Status API abrufen
        run: |
          echo "→ Fetching RSI Status..."

          HTTP=$(curl -s -o rsi-status-raw.json -w "%{http_code}" \
            --max-time 15 \
            "https://status.robertsspaceindustries.com/api/v2/summary.json")

          echo "  HTTP Status: $HTTP"

          if [ "$HTTP" != "200" ]; then
            echo "  Fehler: HTTP $HTTP"
            cat rsi-status-raw.json
            exit 1
          fi

          # Zeitstempel hinzufügen
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('rsi-status-raw.json', 'utf8'));
            data._cached_at = new Date().toISOString();
            fs.writeFileSync('rsi-status.json', JSON.stringify(data, null, 2));
            console.log('✓ Status:', data.status?.description, '@', data._cached_at);
          "

          rm rsi-status-raw.json

      - name: Änderungen committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rsi-status.json
          git diff --staged --quiet \
            && echo "Keine Änderungen." \
            || (git commit -m "chore: update RSI status cache [skip ci]" && git push)
