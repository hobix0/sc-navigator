# update-items.yml
# Nutzt den Cloudflare Worker als Proxy damit GitHub Actions
# nicht von Cloudflare/UEX Corp geblockt wird.

name: Update Items Cache (UEX Corp)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commodity-Liste laden (via Worker)
        run: |
          echo "→ Lade Commodities..."
          HTTP=$(curl -s -o /tmp/commodities.json -w "%{http_code}" \
            --max-time 30 \
            "https://sc-uex-proxy.lucatheis8.workers.dev/commodities")

          echo "  HTTP Status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "  Antwort:"; cat /tmp/commodities.json
            exit 1
          fi
          echo "  Zeilen: $(wc -c < /tmp/commodities.json) bytes"

      - name: Preise laden (via Worker)
        run: |
          echo "→ Lade Preise..."
          HTTP=$(curl -s -o /tmp/prices.json -w "%{http_code}" \
            --max-time 60 \
            "https://sc-uex-proxy.lucatheis8.workers.dev/commodities_prices")

          echo "  HTTP Status Prices: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "  Preise nicht verfügbar (HTTP $HTTP) — fahre fort"
            echo "[]" > /tmp/prices.json
          fi

      - name: Daten verarbeiten
        run: python3 scripts/process-items.py

      - name: Committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-items.json
          git diff --staged --quiet \
            && echo "Keine Änderungen." \
            || (git commit -m "chore: update items cache [skip ci]" && git push)
