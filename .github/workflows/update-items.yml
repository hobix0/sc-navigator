# update-items.yml
# Fix: Python-Code in scripts/process-items.py ausgelagert
# (inline heredoc << kollidierte mit YAML-Syntax)

name: Update Items Cache (UEX Corp)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commodity-Liste laden
        env:
          UEXCORP_KEY: ${{ secrets.UEXCORP_API_KEY }}
        run: |
          echo "→ Lade Commodities..."
          HTTP=$(curl -s -o /tmp/commodities.json -w "%{http_code}" \
            --max-time 30 \
            -H "Accept: application/json" \
            -H "User-Agent: SC-Navigator/1.0" \
            -H "Authorization: Bearer ${UEXCORP_KEY:-public}" \
            "https://api.uexcorp.space/2.0/commodities")

          echo "  HTTP Status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "  API Antwort:"; cat /tmp/commodities.json
            if [ "$HTTP" = "401" ] || [ "$HTTP" = "403" ]; then
              echo "❌ API Key fehlt. Bitte UEXCORP_API_KEY als GitHub Secret hinterlegen."
              echo "   https://uexcorp.space/api.html → kostenlos registrieren"
            fi
            exit 1
          fi

      - name: Preise laden
        env:
          UEXCORP_KEY: ${{ secrets.UEXCORP_API_KEY }}
        run: |
          echo "→ Lade Preise..."
          HTTP=$(curl -s -o /tmp/prices.json -w "%{http_code}" \
            --max-time 60 \
            -H "Accept: application/json" \
            -H "User-Agent: SC-Navigator/1.0" \
            -H "Authorization: Bearer ${UEXCORP_KEY:-public}" \
            "https://api.uexcorp.space/2.0/commodities_prices")

          echo "  HTTP Status Prices: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "  Preise nicht verfügbar (HTTP $HTTP) — fahre mit leerer Preisliste fort"
            echo "[]" > /tmp/prices.json
          fi

      - name: Daten verarbeiten
        run: python3 scripts/process-items.py

      - name: Committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-items.json
          git diff --staged --quiet \
            && echo "Keine Änderungen." \
            || (git commit -m "chore: update items cache [skip ci]" && git push)
