# update-items.yml — UEX Corp Items Cache (Waffen, Rüstungen, Schiffskomponenten)
# Endpoint: /items + /items_prices (nicht /commodities)

name: Update Items Cache (UEX Corp)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Item-Liste laden (via Worker)
        run: |
          echo "→ Lade Items..."
          HTTP=$(curl -s -o /tmp/items.json -w "%{http_code}" \
            --max-time 30 \
            "https://sc-uex-proxy.lucatheis8.workers.dev/items")
          echo "  HTTP Status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "  Antwort:"; cat /tmp/items.json; exit 1
          fi
          echo "  Größe: $(wc -c < /tmp/items.json) bytes"

      - name: Item-Preise laden (via Worker)
        run: |
          echo "→ Lade Item-Preise..."
          HTTP=$(curl -s -o /tmp/items_prices.json -w "%{http_code}" \
            --max-time 90 \
            "https://sc-uex-proxy.lucatheis8.workers.dev/items_prices")
          echo "  HTTP Status Prices: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "  Preise nicht verfügbar (HTTP $HTTP)"
            echo "[]" > /tmp/items_prices.json
          fi
          echo "  Größe: $(wc -c < /tmp/items_prices.json) bytes"

      - name: Daten verarbeiten
        run: python3 scripts/process-items.py

      - name: Committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-items.json
          git diff --staged --quiet \
            && echo "Keine Änderungen." \
            || (git commit -m "chore: update items cache [skip ci]" && git push)
