# update-items.yml
# Das Python-Script übernimmt jetzt alle API-Calls selbst:
#   - Kategorien laden
#   - Items pro Kategorie laden
#   - Preise pro Kategorie laden

name: Update Items Cache (UEX Corp)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Items laden und verarbeiten
        run: python3 scripts/process-items.py

      - name: Committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-items.json
          git diff --staged --quiet \
            && echo "Keine Änderungen." \
            || (git commit -m "chore: update items cache [skip ci]" && git push)
